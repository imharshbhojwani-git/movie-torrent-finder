services:
  - type: web
    name: movie-torrent-finder-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: MASTER_EMAIL
        sync: false
      - key: FRONTEND_URL
        sync: false
